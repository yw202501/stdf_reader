services:
  - type: web
    name: stdf-reader-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stdf-reader-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://stdfreadervercelbundle.vercel.app
      - key: DATA_DIR
        value: /tmp/stdf-reader-data

databases:
  - name: stdf-reader-db
    databaseName: stdf_reader
    user: stdf_reader
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
